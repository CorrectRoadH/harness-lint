<svg xmlns="http://www.w3.org/2000/svg" width="1672" height="941" viewBox="0 0 1672 941" role="img" aria-labelledby="title desc">
  <title id="title">harness lint animated flow</title>
  <desc id="desc">AI agent cards and code cards flow through a lint card into checked output cards.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="46%" r="76%">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset=".72" stop-color="#f7f7f4"/>
      <stop offset="1" stop-color="#eeeeec"/>
    </radialGradient>
    <linearGradient id="pink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff5fbd"/>
      <stop offset="1" stop-color="#f3319a"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16dfc2"/>
      <stop offset="1" stop-color="#00c5a8"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff8b18"/>
      <stop offset="1" stop-color="#ff6508"/>
    </linearGradient>
    <linearGradient id="yellow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffd82c"/>
      <stop offset="1" stop-color="#ffc000"/>
    </linearGradient>
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="1.25" flood-color="#000" flood-opacity=".82"/>
    </filter>
    <style>
      .stroke{stroke:#080808;stroke-width:4;stroke-linecap:round;stroke-linejoin:round}
      .thin{stroke-width:3}
      .label{font-family:Arial,Helvetica,sans-serif;font-weight:900;letter-spacing:0}
      .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-weight:900;letter-spacing:0}
      .code-dark{stroke:#080808;stroke-width:5;stroke-linecap:round}
      .code-white{stroke:#fff;stroke-width:6;stroke-linecap:round}
      .check{animation:checkPulse 2.8s ease-in-out infinite}
      @keyframes checkPulse{0%,100%{opacity:1}50%{opacity:.58}}
      @media (prefers-reduced-motion:reduce){.check{animation:none} animate,animateTransform{display:none}}
    </style>
  </defs>

  <rect width="1672" height="941" fill="url(#bg)"/>

