<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>harness lint hero</title>
    <style>
      @font-face {
        font-family: "Space Grotesk";
        src: local("Space Grotesk Light"),
          url("file:///Users/ctrdh/Library/Fonts/SpaceGrotesk-Light.ttf");
        font-weight: 300 700;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        background: transparent;
      }

      .stage {
        width: 1280px;
        height: 600px;
        border-radius: 28px;
        background:
          radial-gradient(
            900px 520px at 78% 18%,
            rgba(31, 227, 177, 0.18),
            transparent 60%
          ),
          radial-gradient(
            760px 520px at 12% 92%,
            rgba(245, 53, 155, 0.16),
            transparent 58%
          ),
          linear-gradient(160deg, #0c1013 0%, #0a0d0f 60%, #090b0d 100%);
        position: relative;
        overflow: hidden;
        font-family: "Space Grotesk", "Inter", system-ui, sans-serif;
        color: var(--cream);
      }

      :root {
        --teal: #1fe3b1;
        --magenta: #f5359b;
        --orange: #ff7a3d;
        --cream: #f5ead2;
      }

      .stage::before {
        content: "";
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px);
        background-size: 44px 44px;
        mask-image: radial-gradient(120% 120% at 50% 40%, #000 35%, transparent 78%);
      }

      .wrap {
        position: relative;
        z-index: 1;
        height: 100%;
        display: grid;
        grid-template-columns: 1fr 1fr;
        align-items: center;
        padding: 0 52px 0 64px;
        gap: 12px;
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 9px;
        font-size: 15px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: rgba(245, 234, 210, 0.62);
        font-weight: 500;
      }

      .eyebrow .dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: var(--teal);
        box-shadow: 0 0 14px 2px rgba(31, 227, 177, 0.7);
      }

      h1 {
        margin: 18px 0 0;
        font-size: 84px;
        line-height: 0.96;
        font-weight: 700;
        letter-spacing: -0.02em;
      }

      h1 .lint {
        color: var(--teal);
      }

      .tagline {
        margin: 22px 0 0;
        font-size: 25px;
        line-height: 1.38;
        font-weight: 400;
        color: rgba(245, 234, 210, 0.9);
        max-width: 30ch;
      }

      .sub {
        margin: 14px 0 0;
        font-size: 17px;
        color: rgba(245, 234, 210, 0.5);
        font-weight: 400;
        letter-spacing: 0.01em;
      }

      .chips {
        margin: 30px 0 0;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .chip {
        font-size: 15px;
        font-weight: 500;
        padding: 8px 16px;
        border-radius: 999px;
        border: 1.5px solid rgba(245, 234, 210, 0.16);
        color: rgba(245, 234, 210, 0.82);
        background: rgba(255, 255, 255, 0.02);
      }

      .chip.teal {
        border-color: rgba(31, 227, 177, 0.5);
        color: var(--teal);
      }
      .chip.magenta {
        border-color: rgba(245, 53, 155, 0.5);
        color: #ff6bb6;
      }
      .chip.orange {
        border-color: rgba(255, 122, 61, 0.5);
        color: var(--orange);
      }

      .art {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .art svg {
        width: 100%;
        height: auto;
        overflow: visible;
      }
    </style>
  </head>
  <body>
    <div class="stage">
      <div class="wrap">
        <div class="copy">
          <span class="eyebrow"><span class="dot"></span>Harness Engineering · Rust CLI</span>
          <h1>harness <span class="lint">lint</span></h1>
          <p class="tagline">Turn repeated AI mistakes into fast, strict lint rules.</p>
          <p class="sub">Lint Driven Development for coding agents.</p>
          <div class="chips">
            <span class="chip teal">Claude Code</span>
            <span class="chip magenta">Codex</span>
            <span class="chip orange">GritQL</span>
            <span class="chip">Homebrew</span>
          </div>
        </div>

        <div class="art">

              </linearGradient>

                <path d="M332 162 L420 162 Q432 162 432 176 L432 242 Q432 296 376 330 Q320 296 320 242 L320 176 Q320 162 332 162 Z" />
              </clipPath>
            </defs>

            <!-- ===================== INPUT: messy AI output ===================== -->

              <rect x="62" y="90" width="30" height="26" rx="9" fill="#f5359b" />
              <line x1="77" y1="90" x2="77" y2="83" stroke="#f5359b" stroke-width="2.4" />

              <rect x="62" y="132" width="118" height="9" rx="4.5" fill="rgba(245,53,155,0.5)" />
              <rect x="62" y="150" width="92" height="9" rx="4.5" fill="rgba(245,234,210,0.26)" />
              <rect x="62" y="168" width="116" height="9" rx="4.5" fill="rgba(245,234,210,0.26)" />
              <rect x="62" y="186" width="70" height="9" rx="4.5" fill="rgba(245,234,210,0.18)" />
              <rect x="62" y="204" width="100" height="9" rx="4.5" fill="rgba(245,234,210,0.18)" />

            <!-- front card: orange + error -->
            <g transform="rotate(3 193 234)" filter="url(#soft)">

              <rect x="134" y="168" width="30" height="26" rx="9" fill="#ff7a3d" />
              <line x1="149" y1="168" x2="149" y2="161" stroke="#ff7a3d" stroke-width="2.4" />
              <circle cx="149" cy="159" r="2.4" fill="#ff7a3d" />

              <text x="172" y="187" font-family="Space Grotesk, sans-serif" font-size="14" font-weight="600" letter-spacing="1" fill="rgba(245,234,210,0.78)">AGENT</text>
              <rect x="134" y="210" width="118" height="9" rx="4.5" fill="rgba(255,122,61,0.55)" />
              <rect x="134" y="228" width="96" height="9" rx="4.5" fill="rgba(255,77,87,0.7)" />
              <rect x="134" y="246" width="112" height="9" rx="4.5" fill="rgba(245,234,210,0.26)" />
              <rect x="134" y="264" width="74" height="9" rx="4.5" fill="rgba(245,234,210,0.18)" />
              <rect x="134" y="282" width="100" height="9" rx="4.5" fill="rgba(245,234,210,0.18)" />
              <g transform="translate(258 156)">
                <circle r="15" fill="#ff4d57" stroke="#171c20" stroke-width="3" />
                <line x1="-5" y1="-5" x2="5" y2="5" stroke="#fff" stroke-width="3" stroke-linecap="round" />
                <line x1="5" y1="-5" x2="-5" y2="5" stroke="#fff" stroke-width="3" stroke-linecap="round" />
              </g>
            </g>

            <!-- arrow 1 -->
            <g stroke="#f5ead2" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.8">
              <line x1="284" y1="240" x2="312" y2="240" />
              <polyline points="301,230 314,240 301,250" fill="none" />
            </g>

            <!-- ===================== LINT shield ===================== -->
            <ellipse cx="376" cy="356" rx="72" ry="14" fill="#1fe3b1" opacity="0.22" filter="url(#glow)" />
            <ellipse cx="376" cy="344" rx="46" ry="9" fill="#000" opacity="0.32" />
            <g filter="url(#soft)">
              <path d="M332 162 L420 162 Q432 162 432 176 L432 242 Q432 296 376 330 Q320 296 320 242 L320 176 Q320 162 332 162 Z" fill="url(#shieldGrad)" />
              <g clip-path="url(#shieldClip)">
                <ellipse cx="350" cy="186" rx="46" ry="26" fill="#ffffff" opacity="0.16" />
              </g>
              <path d="M332 162 L420 162 Q432 162 432 176 L432 242 Q432 296 376 330 Q320 296 320 242 L320 176 Q320 162 332 162 Z" fill="none" stroke="#ffffff" stroke-width="1.2" stroke-opacity="0.25" />
              <text x="376" y="212" text-anchor="middle" font-family="Space Grotesk, sans-serif" font-size="28" font-weight="700" letter-spacing="3" fill="#06302a">LINT</text>
              <polyline points="356,272 371,288 402,250" fill="none" stroke="#06302a" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" />
            </g>

            <!-- arrow 2 -->
            <g stroke="#f5ead2" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.8">
              <line x1="452" y1="240" x2="484" y2="240" />
              <polyline points="473,230 486,240 473,250" fill="none" />
            </g>

            <!-- ===================== OUTPUT: clean, passing ===================== -->
            <!-- teal -->
            <g filter="url(#soft)">
              <rect x="500" y="206" width="56" height="140" rx="16" fill="#171c20" stroke="#1fe3b1" stroke-width="2" stroke-opacity="0.55" />
              <text x="528" y="236" text-anchor="middle" font-family="Space Grotesk, sans-serif" font-size="16" font-weight="700" fill="#1fe3b1">&lt;/&gt;</text>
              <rect x="512" y="254" width="32" height="7" rx="3.5" fill="rgba(31,227,177,0.5)" />
              <rect x="512" y="270" width="24" height="7" rx="3.5" fill="rgba(245,234,210,0.26)" />
              <rect x="512" y="286" width="30" height="7" rx="3.5" fill="rgba(245,234,210,0.26)" />
            </g>
            <!-- orange -->
            <g filter="url(#soft)">
              <rect x="576" y="206" width="56" height="140" rx="16" fill="#171c20" stroke="#ff7a3d" stroke-width="2" stroke-opacity="0.55" />
              <text x="604" y="236" text-anchor="middle" font-family="Space Grotesk, sans-serif" font-size="16" font-weight="700" fill="#ff7a3d">&lt;/&gt;</text>
              <rect x="588" y="254" width="32" height="7" rx="3.5" fill="rgba(255,122,61,0.5)" />
              <rect x="588" y="270" width="24" height="7" rx="3.5" fill="rgba(245,234,210,0.26)" />
              <rect x="588" y="286" width="30" height="7" rx="3.5" fill="rgba(245,234,210,0.26)" />
            </g>
            <!-- magenta -->
            <g filter="url(#soft)">
              <rect x="652" y="206" width="56" height="140" rx="16" fill="#171c20" stroke="#f5359b" stroke-width="2" stroke-opacity="0.55" />
              <text x="680" y="236" text-anchor="middle" font-family="Space Grotesk, sans-serif" font-size="16" font-weight="700" fill="#f5359b">&lt;/&gt;</text>
              <rect x="664" y="254" width="32" height="7" rx="3.5" fill="rgba(245,53,155,0.5)" />
              <rect x="664" y="270" width="24" height="7" rx="3.5" fill="rgba(245,234,210,0.26)" />
              <rect x="664" y="286" width="30" height="7" rx="3.5" fill="rgba(245,234,210,0.26)" />
            </g>
            <!-- pass checks -->
            <g transform="translate(548 338)">
              <circle r="12" fill="#1fe3b1" stroke="#0a0d0f" stroke-width="3" />
              <polyline points="-4.5,0 -1,4 5,-5" fill="none" stroke="#06302a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
            </g>
            <g transform="translate(624 338)">
              <circle r="12" fill="#1fe3b1" stroke="#0a0d0f" stroke-width="3" />
              <polyline points="-4.5,0 -1,4 5,-5" fill="none" stroke="#06302a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
            </g>
            <g transform="translate(700 338)">
              <circle r="12" fill="#1fe3b1" stroke="#0a0d0f" stroke-width="3" />
              <polyline points="-4.5,0 -1,4 5,-5" fill="none" stroke="#06302a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
            </g>

            <!-- ===================== accents ===================== -->
            <path d="M298 150 l5 12 12 5 -12 5 -5 12 -5 -12 -12 -5 12 -5 z" fill="#ffd23f" opacity="0.9" />
            <path d="M462 176 l4 9 9 4 -9 4 -4 9 -4 -9 -9 -4 9 -4 z" fill="#f5ead2" opacity="0.7" />

        </div>
      </div>
    </div>
  </body>
