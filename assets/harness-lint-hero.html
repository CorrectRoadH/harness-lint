<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>harness lint hero</title>
    <style>
      @font-face {
        font-family: "Space Grotesk";
        src: local("Space Grotesk Light"),
          url("file:///Users/ctrdh/Library/Fonts/SpaceGrotesk-Light.ttf");
        font-weight: 300 700;
      }

      :root {
        --teal: #1fe3b1;
        --magenta: #f5359b;
        --orange: #ff7a3d;
        --cream: #f5ead2;
        --ink: #0a0d0f;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        background: transparent;
      }

      .stage {
        width: 1280px;
        height: 600px;
        border-radius: 28px;
        background:
          radial-gradient(
            900px 520px at 78% 18%,
            rgba(31, 227, 177, 0.18),
            transparent 60%
          ),
          radial-gradient(
            760px 520px at 12% 92%,
            rgba(245, 53, 155, 0.16),
            transparent 58%
          ),
          linear-gradient(160deg, #0c1013 0%, #0a0d0f 60%, #090b0d 100%);
        position: relative;
        overflow: hidden;
        font-family: "Space Grotesk", "Inter", system-ui, sans-serif;
        color: var(--cream);
      }

      .stage::before {
        content: "";
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px);
        background-size: 44px 44px;
        mask-image: radial-gradient(120% 120% at 50% 40%, #000 35%, transparent 78%);
      }

      .wrap {
        position: relative;
        z-index: 1;
        height: 100%;
        display: grid;
        grid-template-columns: 1fr 1fr;
        align-items: center;
        padding: 0 56px 0 64px;
        gap: 16px;
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 9px;
        font-size: 15px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: rgba(245, 234, 210, 0.62);
        font-weight: 500;
      }

      .eyebrow .dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: var(--teal);
        box-shadow: 0 0 14px 2px rgba(31, 227, 177, 0.7);
      }

      h1 {
        margin: 18px 0 0;
        font-size: 84px;
        line-height: 0.96;
        font-weight: 700;
        letter-spacing: -0.02em;
      }

      h1 .lint {
        color: var(--teal);
      }

      .tagline {
        margin: 22px 0 0;
        font-size: 25px;
        line-height: 1.38;
        font-weight: 400;
        color: rgba(245, 234, 210, 0.9);
        max-width: 30ch;
      }

      .sub {
        margin: 14px 0 0;
        font-size: 17px;
        color: rgba(245, 234, 210, 0.5);
        font-weight: 400;
        letter-spacing: 0.01em;
      }

      .chips {
        margin: 30px 0 0;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .chip {
        font-size: 15px;
        font-weight: 500;
        padding: 8px 16px;
        border-radius: 999px;
        border: 1.5px solid rgba(245, 234, 210, 0.16);
        color: rgba(245, 234, 210, 0.82);
        background: rgba(255, 255, 255, 0.02);
      }

      .chip.teal {
        border-color: rgba(31, 227, 177, 0.5);
        color: var(--teal);
      }
      .chip.magenta {
        border-color: rgba(245, 53, 155, 0.5);
        color: #ff6bb6;
      }
      .chip.orange {
        border-color: rgba(255, 122, 61, 0.5);
        color: var(--orange);
      }

      .art {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .art svg {
        width: 100%;
        height: auto;
        overflow: visible;
      }
    </style>
  </head>
  <body>
    <div class="stage">
      <div class="wrap">
        <div class="copy">
          <span class="eyebrow"><span class="dot"></span>Harness Engineering · Rust CLI</span>
          <h1>harness <span class="lint">lint</span></h1>
          <p class="tagline">Turn repeated AI mistakes into fast, strict lint rules.</p>
          <p class="sub">Lint Driven Development for coding agents.</p>
          <div class="chips">
            <span class="chip teal">Claude Code</span>
            <span class="chip magenta">Codex</span>
            <span class="chip orange">GritQL</span>
            <span class="chip">Homebrew</span>
          </div>
        </div>

        <div class="art">
          <svg viewBox="0 0 720 520" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
                <feGaussianBlur stdDeviation="16" />
              </filter>
              <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
                <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000" flood-opacity="0.45" />
              </filter>
              <linearGradient id="gateGrad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0" stop-color="#2af0bd" />
                <stop offset="1" stop-color="#10b48a" />
              </linearGradient>
            </defs>

            <!-- ============ INPUT: messy AI output ============ -->
            <!-- back card (magenta) -->
            <g transform="rotate(-10 96 150)" filter="url(#soft)">
              <rect x="34" y="74" width="124" height="152" rx="18" fill="#1a2024" stroke="#f5359b" stroke-width="2.5" />
              <rect x="34" y="74" width="124" height="40" rx="18" fill="#f5359b" />
              <rect x="34" y="96" width="124" height="18" fill="#f5359b" />
              <!-- robot glyph -->
              <rect x="50" y="84" width="26" height="20" rx="6" fill="#1a2024" />
              <circle cx="58" cy="94" r="2.6" fill="#fff" />
              <circle cx="68" cy="94" r="2.6" fill="#fff" />
              <line x1="63" y1="84" x2="63" y2="78" stroke="#1a2024" stroke-width="2.2" />
              <circle cx="63" cy="76" r="2.4" fill="#1a2024" />
              <text x="86" y="99" font-family="Space Grotesk, sans-serif" font-size="13" font-weight="700" fill="#1a2024" letter-spacing="0.5">AGENT</text>
              <!-- uneven code lines -->
              <rect x="50" y="130" width="78" height="7" rx="3.5" fill="rgba(245,53,155,0.55)" />
              <rect x="50" y="146" width="58" height="7" rx="3.5" fill="rgba(245,234,210,0.35)" />
              <rect x="50" y="162" width="88" height="7" rx="3.5" fill="rgba(245,234,210,0.35)" />
              <rect x="50" y="178" width="44" height="7" rx="3.5" fill="rgba(245,234,210,0.22)" />
              <rect x="50" y="194" width="70" height="7" rx="3.5" fill="rgba(245,234,210,0.22)" />
            </g>

            <!-- front card (orange) with error -->
            <g transform="rotate(-2 150 250)" filter="url(#soft)">
              <rect x="88" y="174" width="124" height="152" rx="18" fill="#1a2024" stroke="#ff7a3d" stroke-width="2.5" />
              <rect x="88" y="174" width="124" height="40" rx="18" fill="#ff7a3d" />
              <rect x="88" y="196" width="124" height="18" fill="#ff7a3d" />
              <rect x="104" y="184" width="26" height="20" rx="6" fill="#1a2024" />
              <circle cx="112" cy="194" r="2.6" fill="#fff" />
              <circle cx="122" cy="194" r="2.6" fill="#fff" />
              <line x1="117" y1="184" x2="117" y2="178" stroke="#1a2024" stroke-width="2.2" />
              <circle cx="117" cy="176" r="2.4" fill="#1a2024" />
              <text x="140" y="199" font-family="Space Grotesk, sans-serif" font-size="13" font-weight="700" fill="#1a2024" letter-spacing="0.5">AGENT</text>
              <rect x="104" y="230" width="84" height="7" rx="3.5" fill="rgba(255,122,61,0.6)" />
              <rect x="104" y="246" width="62" height="7" rx="3.5" fill="rgba(245,234,210,0.35)" />
              <rect x="104" y="262" width="74" height="7" rx="3.5" fill="rgba(245,234,210,0.35)" />
              <rect x="104" y="278" width="50" height="7" rx="3.5" fill="rgba(245,234,210,0.22)" />
              <rect x="104" y="294" width="80" height="7" rx="3.5" fill="rgba(245,234,210,0.22)" />
            </g>
            <!-- error badge -->
            <g transform="translate(206 178)">
              <circle r="15" fill="#ff4d57" stroke="#1a2024" stroke-width="3" />
              <line x1="-5" y1="-5" x2="5" y2="5" stroke="#fff" stroke-width="3" stroke-linecap="round" />
              <line x1="5" y1="-5" x2="-5" y2="5" stroke="#fff" stroke-width="3" stroke-linecap="round" />
            </g>

            <!-- arrow 1 -->
            <g stroke="#f5ead2" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.85">
              <line x1="246" y1="252" x2="288" y2="252" />
              <polyline points="278,242 290,252 278,262" fill="none" />
            </g>

            <!-- ============ LINT GATE ============ -->
            <ellipse cx="362" cy="408" rx="78" ry="16" fill="#1fe3b1" opacity="0.18" filter="url(#glow)" />
            <g filter="url(#soft)">
              <rect x="306" y="150" width="112" height="210" rx="24" fill="url(#gateGrad)" />
              <rect x="306" y="150" width="112" height="210" rx="24" fill="none" stroke="#0a0d0f" stroke-width="2" opacity="0.25" />
              <text x="362" y="206" text-anchor="middle" font-family="Space Grotesk, sans-serif" font-size="30" font-weight="700" fill="#06241c" letter-spacing="2">LINT</text>
              <!-- shield check -->
              <path d="M362 232 l34 13 v34 c0 26 -18 41 -34 49 c-16 -8 -34 -23 -34 -49 v-34 z" fill="#06281f" />
              <polyline points="347,288 358,300 379,275" fill="none" stroke="#2af0bd" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round" />
            </g>
            <!-- gate stand -->
            <rect x="346" y="360" width="32" height="22" fill="#0f7a5c" />
            <rect x="320" y="380" width="84" height="12" rx="6" fill="#0c6249" />

            <!-- arrow 2 -->
            <g stroke="#f5ead2" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.85">
              <line x1="436" y1="252" x2="478" y2="252" />
              <polyline points="468,242 480,252 468,262" fill="none" />
            </g>

            <!-- ============ OUTPUT: clean, passing ============ -->
            <!-- card stands -->
            <ellipse cx="533" cy="356" rx="34" ry="8" fill="#000" opacity="0.35" />
            <ellipse cx="611" cy="356" rx="34" ry="8" fill="#000" opacity="0.35" />
            <ellipse cx="689" cy="356" rx="34" ry="8" fill="#000" opacity="0.35" />

            <!-- output card: teal -->
            <g filter="url(#soft)">
              <rect x="503" y="196" width="60" height="150" rx="14" fill="#13241f" stroke="#1fe3b1" stroke-width="2.5" />
              <text x="533" y="226" text-anchor="middle" font-family="Space Grotesk, sans-serif" font-size="17" font-weight="700" fill="#1fe3b1">&lt;/&gt;</text>
              <rect x="516" y="244" width="34" height="6" rx="3" fill="rgba(31,227,177,0.5)" />
              <rect x="516" y="258" width="26" height="6" rx="3" fill="rgba(245,234,210,0.32)" />
              <rect x="516" y="272" width="32" height="6" rx="3" fill="rgba(245,234,210,0.32)" />
              <rect x="516" y="286" width="22" height="6" rx="3" fill="rgba(245,234,210,0.32)" />
            </g>
            <!-- output card: orange -->
            <g filter="url(#soft)">
              <rect x="581" y="196" width="60" height="150" rx="14" fill="#241a14" stroke="#ff7a3d" stroke-width="2.5" />
              <text x="611" y="226" text-anchor="middle" font-family="Space Grotesk, sans-serif" font-size="17" font-weight="700" fill="#ff7a3d">&lt;/&gt;</text>
              <rect x="594" y="244" width="34" height="6" rx="3" fill="rgba(255,122,61,0.5)" />
              <rect x="594" y="258" width="26" height="6" rx="3" fill="rgba(245,234,210,0.32)" />
              <rect x="594" y="272" width="32" height="6" rx="3" fill="rgba(245,234,210,0.32)" />
              <rect x="594" y="286" width="22" height="6" rx="3" fill="rgba(245,234,210,0.32)" />
            </g>
            <!-- output card: magenta -->
            <g filter="url(#soft)">
              <rect x="659" y="196" width="60" height="150" rx="14" fill="#241420" stroke="#f5359b" stroke-width="2.5" />
              <text x="689" y="226" text-anchor="middle" font-family="Space Grotesk, sans-serif" font-size="17" font-weight="700" fill="#f5359b">&lt;/&gt;</text>
              <rect x="672" y="244" width="34" height="6" rx="3" fill="rgba(245,53,155,0.5)" />
              <rect x="672" y="258" width="26" height="6" rx="3" fill="rgba(245,234,210,0.32)" />
              <rect x="672" y="272" width="32" height="6" rx="3" fill="rgba(245,234,210,0.32)" />
              <rect x="672" y="286" width="22" height="6" rx="3" fill="rgba(245,234,210,0.32)" />
            </g>
            <!-- pass checks -->
            <g transform="translate(556 330)">
              <circle r="13" fill="#1fe3b1" stroke="#0a0d0f" stroke-width="3" />
              <polyline points="-5,0 -1,5 6,-5" fill="none" stroke="#06281f" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" />
            </g>
            <g transform="translate(634 330)">
              <circle r="13" fill="#1fe3b1" stroke="#0a0d0f" stroke-width="3" />
              <polyline points="-5,0 -1,5 6,-5" fill="none" stroke="#06281f" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" />
            </g>
            <g transform="translate(712 330)">
              <circle r="13" fill="#1fe3b1" stroke="#0a0d0f" stroke-width="3" />
              <polyline points="-5,0 -1,5 6,-5" fill="none" stroke="#06281f" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" />
            </g>

            <!-- ============ floating accents ============ -->
            <g opacity="0.9">
              <path d="M250 120 l5 12 12 5 -12 5 -5 12 -5 -12 -12 -5 12 -5 z" fill="#ffd23f" />
              <path d="M470 150 l4 9 9 4 -9 4 -4 9 -4 -9 -9 -4 9 -4 z" fill="#f5ead2" opacity="0.8" />
              <rect x="156" y="40" width="16" height="16" rx="3" fill="#f5359b" transform="rotate(20 164 48)" />
              <rect x="630" y="430" width="14" height="14" rx="3" fill="#1fe3b1" transform="rotate(-15 637 437)" />
            </g>
          </svg>
        </div>
      </div>
    </div>
  </body>
</html>
