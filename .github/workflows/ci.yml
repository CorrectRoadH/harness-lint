name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: npm install --location=global @getgrit/cli
      - run: grit --version
      - run: cargo fmt --check
      - run: cargo test --all
      - run: cargo build --release
